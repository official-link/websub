<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料领取中心</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .container { background: #fff; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        p { color: #666; font-size: 16px; }
        .copy-btn { background-color: #07c160; color: white; padding: 12px 24px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎉 恭喜！资料包已就绪</h2>
        <p>点击下方按钮，资料领取成功，。</p>
        <button class="copy-btn" onclick="copyAndJump()">立即免费领取资料</button>
    </div>
    <script>
        function copyAndJump() {
            var wechatId = "dddd999"; // 👈 修改这里
            var aux = document.createElement("input");
            aux.setAttribute("value", wechatId);
            document.body.appendChild(aux);
            aux.select();
            document.execCommand("copy");
            document.body.removeChild(aux);
            alert("。");
            // （部分环境有效）
            window.location.href = " **://"; 
        }
    </script>
</body>
</html>
